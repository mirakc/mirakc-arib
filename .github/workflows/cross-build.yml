name: cross-build

on:
  workflow_call:

permissions: {}

jobs:
  cross-build:
    strategy:
      matrix:
        arch:
          # Disabled because there is no linux/arm/v5 image of ubuntu.
          # - armel
          - armhf
          - arm64
        include:
          # - arch: armel
          #   host-triple: arm-linux-gnueabi
          #   elf-machine: 'ARM'
          #   elf-flags: 'soft-float'
          #   docker-platform: linux/arm/v5
          - arch: armhf
            host-triple: arm-linux-gnueabihf
            elf-machine: 'ARM'
            elf-flags: 'hard-float'
            docker-platform: linux/arm/v7
          - arch: arm64
            host-triple: aarch64-linux-gnu
            elf-machine: 'AArch64'
            elf-flags: ''
            docker-platform: linux/arm64/v8
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends autoconf automake cmake dos2unix g++-$HOST_TRIPLE libtool make ninja-build pkg-config
        env:
          HOST_TRIPLE: ${{ matrix.host-triple }}
      - name: Generate project files
        run: |
          cmake -S . -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D MIRAKC_ARIB_TEST=ON -D CMAKE_TOOLCHAIN_FILE=toolchain.cmake.d/debian-$ARCH.cmake .
        env:
          ARCH: ${{ matrix.arch }}
      - name: Build vendor libraries
        run: |
          ninja -C build vendor
      - name: Build
        run: |
          ninja -C build
      - name: Check the binary format
        run: |
          readelf -h build/bin/mirakc-arib | grep Machine | grep "$ELF_MACHINE"
          readelf -h build/bin/mirakc-arib | grep Flags | grep "$ELF_FLAGS"
        env:
          ELF_MACHINE: ${{ matrix.elf-machine }}
          ELF_FLAGS: ${{ matrix.elf-flags }}
      - name: Setup QEMU user-mode emulation
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Show help and version
        run: |
          sudo apt-get install -y --no-install-recommends lsb-release
          docker run --rm -v $(pwd)/build:/build --platform $PLATFORM ubuntu:$(lsb_release -cs) /build/bin/mirakc-arib -h
          docker run --rm -v $(pwd)/build:/build --platform $PLATFORM ubuntu:$(lsb_release -cs) /build/bin/mirakc-arib --version
        env:
          PLATFORM: ${{ matrix.docker-platform }}
      - name: Run tests
        run: |
          docker run --rm -e CI=$CI -v $(pwd)/build:/build --platform $PLATFORMubuntu:$(lsb_release -cs) /build/bin/mirakc-arib-test --gtest_shuffle
          docker run --rm -e CI=$CI -v $(pwd)/build:/build -v $(pwd)/test:/test --platform $PLATFORM ubuntu:$(lsb_release -cs) sh /test/cli_tests.sh /build/bin/mirakc-arib
        env:
          PLATFORM: ${{ matrix.docker-platform }}
