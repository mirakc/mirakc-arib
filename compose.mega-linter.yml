services:
  megalinter:
    image: ghcr.io/oxsecurity/megalinter-c_cpp:v9.6.0@sha256:1f073b181f9b5676c96cac8ca18a573b66ee7733dc1dc004dec891c4c002816e # editorconfig-checker-disable-line
    # Every variable below can be overridden from the host environment except
    # DEFAULT_WORKSPACE, which must match the volume mount path below.
    environment:
      - APPLY_FIXES
      - ENABLE_LINTERS
      - LOG_LEVEL
      - CLEAR_REPORT_FOLDER=${CLEAR_REPORT_FOLDER:-true}
      - DEFAULT_WORKSPACE=/tmp/lint
    volumes:
      - .:/tmp/lint
